name: Deploy DocFX + MkDocs to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure git for HTTPS submodule access
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global submodule.recurse false

      - name: Checkout all submodules (best-effort, parallel)
        run: |
          # Best-effort: 128 submodules cloned in parallel. A single missing or
          # unreachable submodule must NOT kill the whole workflow — we still
          # want to publish landings/docs for the packages that did materialize.
          # No --depth: parent may pin a commit older than the submodule's master HEAD,
          # which a shallow fetch cannot resolve.
          set +e
          git submodule update --init --recursive --jobs 8
          status=$?
          set -e
          echo "submodule update exit code: $status"

          missing=0
          present=0
          for path in $(git config --file .gitmodules --get-regexp 'submodule\..*\.path' | awk '{print $2}'); do
            if [ -f "$path/$(basename "$path")/$(basename "$path").csproj" ]; then
              present=$((present + 1))
            else
              missing=$((missing + 1))
              echo "MISSING: $path"
            fi
          done
          echo "Submodules with csproj: $present, missing: $missing"

          # Abort only if NOTHING checked out — otherwise proceed with what we have.
          if [ "$present" -eq 0 ]; then
            echo "::error::No submodules materialized; aborting."
            exit 1
          fi

      - name: Regenerate docs configs (all packages)
        shell: pwsh
        run: ./.scripts/generate-docs-config.ps1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # All three SDKs are needed: every package targets net10.0;net9.0;net8.0.
          # Even though docfx is told to use net9.0, msbuild evaluates the full
          # <TargetFrameworks> list during restore and fails if any SDK is missing.
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-docfx-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-docfx-
            ${{ runner.os }}-nuget-

      - name: Install DocFX
        run: |
          dotnet tool install -g docfx
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Verify .NET SDKs installed
        run: |
          echo "=== Installed SDKs ==="
          dotnet --list-sdks
          echo "=== Default runtime ==="
          dotnet --list-runtimes | head -20

      - name: Run DocFX metadata (generate API yml)
        run: |
          # Split metadata from build so failures here are unambiguous.
          # docfx metadata invokes msbuild per-project; a single broken csproj
          # would otherwise be lost in the merged "build" output.
          docfx metadata .docfx/docfx.json --logLevel info 2>&1 | tee docfx-metadata.log
          echo "=== api/ output ==="
          ls -la .docfx/api/ 2>/dev/null | head -20 || echo "NO api/ FOLDER"
          yml_count=$(find .docfx/api -name "*.yml" 2>/dev/null | wc -l)
          echo "Generated $yml_count yml file(s)"
          if [ "$yml_count" -lt 50 ]; then
            echo "::error::Expected ~128 yml files, got $yml_count — metadata is broken."
            echo "=== Errors in metadata log ==="
            grep -iE "error|fatal|exception|fail" docfx-metadata.log | head -50
            exit 1
          fi

      - name: Build DocFX site (render yml -> html)
        run: docfx build .docfx/docfx.json --logLevel info 2>&1 | tee docfx-build.log

      - name: Always upload DocFX logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docfx-logs
          path: |
            docfx-metadata.log
            docfx-build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material pymdown-extensions

      - name: Build MkDocs site
        working-directory: .mkdocs
        # --strict is not used: MkDocs flags cross-site links into ../api/ (DocFX
        # output that lives outside the MkDocs docs tree) as broken, even though
        # they resolve correctly once both sites are merged under _site/.
        run: mkdocs build

      - name: Merge MkDocs output into DocFX site under /guide
        run: |
          mkdir -p .docfx/_site/guide
          cp -r .mkdocs/site/. .docfx/_site/guide/

      - name: Merge per-package mini-landings into site root
        run: cp -r .landings/. .docfx/_site/

      - name: Verify combined output
        run: |
          echo "=== DocFX root ==="
          ls -la .docfx/_site/ | head -30
          echo "=== Guide (MkDocs) ==="
          ls -la .docfx/_site/guide/ | head -20

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .docfx/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
