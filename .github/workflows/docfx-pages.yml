name: Deploy DocFX to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout SunamoArgs submodule
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --depth 1 SunamoArgs

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-docfx-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-docfx-
            ${{ runner.os }}-nuget-

      - name: Install DocFX
        run: |
          dotnet tool install -g docfx
          export PATH="$PATH:$HOME/.dotnet/tools"
          docfx --version

      - name: Generate documentation
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          docfx .docfx/docfx.json

      - name: Verify output exists
        run: |
          echo "=== DocFX output ==="
          ls -laR .docfx/_site/ | head -50

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .docfx/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
