name: Deploy DocFX + MkDocs to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout SunamoString submodule (preview build)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          # No --depth: the parent repo may pin a commit that is no longer the tip of master,
          # in which case a shallow fetch fails to materialize the recorded SHA.
          git submodule update --init SunamoString

      - name: Regenerate docs configs (SunamoString only — preview)
        shell: pwsh
        run: ./.scripts/generate-docs-config.ps1 -OnlyPackages SunamoString

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-docfx-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-docfx-
            ${{ runner.os }}-nuget-

      - name: Install DocFX
        run: |
          dotnet tool install -g docfx
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Build DocFX site
        run: docfx .docfx/docfx.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material pymdown-extensions

      - name: Build MkDocs site
        working-directory: .mkdocs
        # --strict is not used: MkDocs flags cross-site links into ../api/ (DocFX
        # output that lives outside the MkDocs docs tree) as broken, even though
        # they resolve correctly once both sites are merged under _site/.
        run: mkdocs build

      - name: Merge MkDocs output into DocFX site under /guide
        run: |
          mkdir -p .docfx/_site/guide
          cp -r .mkdocs/site/. .docfx/_site/guide/

      - name: Verify combined output
        run: |
          echo "=== DocFX root ==="
          ls -la .docfx/_site/ | head -30
          echo "=== Guide (MkDocs) ==="
          ls -la .docfx/_site/guide/ | head -20

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .docfx/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
